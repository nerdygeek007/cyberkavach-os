version: '3.8'

services:
  cyberkavach_postgres:
    image: postgres:15-alpine
    container_name: cyberkavach_postgres
    environment:
      POSTGRES_USER: cyber_admin
      POSTGRES_PASSWORD: cyber_secure_password
      POSTGRES_DB: cyberkavach_db
    ports:
      - "5434:5432"
    volumes:
      - cyberkavach_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  cyberkavach_redis:
    image: redis:7-alpine
    container_name: cyberkavach_redis
    ports:
      - "6380:6379"
    volumes:
      - cyberkavach_redisdata:/data
    restart: unless-stopped

volumes:
  cyberkavach_pgdata:
  cyberkavach_redisdata:
